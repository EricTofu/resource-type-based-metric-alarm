name: Terraform CI

on:
  pull_request:
    paths:
      - "modules/**"
      - "stacks/**"
      - ".tflint.hcl"

permissions:
  contents: read

jobs:
  detect-stacks:
    name: Detect changed stacks
    runs-on: ubuntu-latest
    outputs:
      stacks: ${{ steps.find.outputs.stacks }}

    steps:
      - uses: actions/checkout@v4

      - name: Find all stack directories
        id: find
        run: |
          stacks=$(find stacks -name versions.tf -exec dirname {} \; | sort | jq -R . | jq -sc .)
          echo "stacks=$stacks" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate ${{ matrix.stack }}
    runs-on: ubuntu-latest
    needs: detect-stacks
    if: needs.detect-stacks.outputs.stacks != '[]'

    strategy:
      fail-fast: false
      matrix:
        stack: ${{ fromJson(needs.detect-stacks.outputs.stacks) }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"

      - name: terraform init (no backend)
        working-directory: ${{ matrix.stack }}
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: ${{ matrix.stack }}
        run: terraform validate

  validate-modules:
    name: Validate library modules
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"

      - name: Validate each library module
        run: |
          FAILED=0
          for dir in modules/cloudwatch/metrics-alarm/*/; do
            echo "--- Validating $dir"
            terraform -chdir="$dir" init -backend=false && \
            terraform -chdir="$dir" validate || FAILED=1
          done
          exit $FAILED

  lint:
    name: TFLint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: "v0.52.0"

      - name: Init TFLint plugins
        run: tflint --config="$(pwd)/.tflint.hcl" --init

      - name: Lint library modules
        run: |
          FAILED=0
          for dir in modules/cloudwatch/metrics-alarm/*/; do
            echo "--- Linting $dir"
            tflint --config="$(pwd)/.tflint.hcl" --chdir="$dir" || FAILED=1
          done
          exit $FAILED

      - name: Lint stacks
        run: |
          FAILED=0
          for dir in $(find stacks -name versions.tf -exec dirname {} \;); do
            echo "--- Linting $dir"
            tflint --config="$(pwd)/.tflint.hcl" --chdir="$dir" || FAILED=1
          done
          exit $FAILED

  fmt:
    name: Terraform Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"

      - name: Check formatting
        run: terraform fmt -recursive -check
