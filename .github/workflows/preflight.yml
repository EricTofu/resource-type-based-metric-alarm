name: Preflight — metric-prereq checks

on:
  pull_request:
    paths:
      - 'stacks/services/**/terraform.tfvars'
      - 'scripts/check_*.sh'

jobs:
  check-ec2-mem-metric:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS creds (read-only)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PREFLIGHT_READ_ROLE_ARN }}
          aws-region: ap-northeast-1
      - name: Run EC2 mem-metric preflight
        run: |
          for tfvars in stacks/services/*/*/terraform.tfvars; do
            if [[ -f "$tfvars" ]]; then
              scripts/check_ec2_mem_metric.sh --tfvars "$tfvars" || true
            fi
          done

  check-asg-metric:
    runs-on: ubuntu-latest
    needs: check-ec2-mem-metric
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PREFLIGHT_READ_ROLE_ARN }}
          aws-region: ap-northeast-1
      - run: |
          for tfvars in stacks/services/*/*/terraform.tfvars; do
            if [[ -f "$tfvars" ]]; then
              scripts/check_asg_metric.sh --tfvars "$tfvars" || true
            fi
          done

  check-s3-request-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PREFLIGHT_READ_ROLE_ARN }}
          aws-region: ap-northeast-1
      - run: |
          for tfvars in stacks/services/*/*/terraform.tfvars; do
            if [[ -f "$tfvars" ]]; then
              scripts/check_s3_request_metrics.sh --tfvars "$tfvars" || true
            fi
          done